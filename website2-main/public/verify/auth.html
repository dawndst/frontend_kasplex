<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./images/favicon.ico" />
    <title>Kasplex Authorization</title>
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #050b0d;
            color: #e6fefe;
        }

        .header {
            height: 68px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
        }

        .logo {
            margin-top: 6px;
            margin-left: 6px;
            box-sizing: border-box;
        }

        .logo img {
            width: 123px;
        }

        .container {
            height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            max-width: 720px;
            text-align: center;
            font-size: 20px;
            line-height: 1.7;
            padding: 40px;
            border-radius: 12px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.15);
        }

        .highlight {
            color: #31e7e7;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="header">
        <a href="https://kasplex.org" class="logo">
            <img src="./images/logo.png" alt="Kasplex">
        </a>
    </div>
    <div class="container">
        <div class="box">
            We are the <span class="highlight">Kasplex team</span>, and we authorize the email
            <span class="highlight">je.yeol@kaspafoundation.org</span>
            to manage our project information on <span class="highlight">RootData</span>.
        </div>
    </div>
</body>

</html>
